name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  # Survive flaky crates.io downloads (the kind that sank the first release run).
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  binary:
    name: build binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # one flaky target shouldn't cancel the others
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Fetch dependencies (with retries)
        run: |
          for i in 1 2 3 4 5; do
            cargo fetch --target ${{ matrix.target }} && exit 0
            echo "::warning::cargo fetch attempt $i failed; retrying in 15s"
            sleep 15
          done
          echo "::error::cargo fetch failed after 5 attempts"; exit 1

      - name: Build
        run: cargo build --release --offline --bin etherealdb --target ${{ matrix.target }}

      - name: Package
        run: |
          tar -C target/${{ matrix.target }}/release -czf \
            etherealdb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz etherealdb

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: etherealdb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          generate_release_notes: true

  docker:
    name: build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
